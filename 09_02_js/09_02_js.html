<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Saluto personalizzato</title>
</head>

<body>

    <!-- Titolo -->
    <h1>Secondo esercizio JavaScript</h1>

    <!-- Pulsante -->
    <button onclick="saluta()">Inserisci nome</button>


    <script>

        function saluta() {
            // chiede il nome
            let nome = prompt("Inserisci il tuo nome");

            // messaggio personalizzato
            alert("Ciao " + nome + " ! Benvenuto.");
        }

    </script>

</body>

</html>
