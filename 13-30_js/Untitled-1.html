<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Static Template</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300&display=swap"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <form
      id="myform"
      action="https://www.w3schools.com/action_page.php"
      method="POST"
    >
      <div id="container">
        <header>Iscrizione</header>
        <div><label for="id_nome">Nome:</label></div>
        <div><input id="id_nome" type="text" name="nome" required /></div>
        <div><label for="id_cognome">Cognome:</label></div>
        <div><input id="id_cognome" type="text" name="cognome" required /></div>
        <div><label for="id_data">Data di nascita:</label></div>
        <div><input id="id_data" type="date" name="data" required /></div>
        <div>Sesso:</div>
        <div>
          <input type="radio" name="sesso" value="m" id="sesso_m" />
          <label for="sesso_m">Uomo</label>
          <input type="radio" name="sesso" value="f" id="sesso_f" />
          <label for="sesso_f">Donna</label>
          <input type="radio" name="sesso" value="a" id="sesso_a" />
          <label for="sesso_a">Altro</label>
        </div>
        <div><label for="id_nazione">Nazione di nascita:</label></div>
        <div>
          <select name="nazione" id="id_nazione">
            <option value="Italia">Italia</option>
            <option value="Italia">Stati Uniti</option>
            <option value="Italia">Spagna</option>
            <option value="Italia">Germania</option>
            <option value="Italia">Francia</option>
          </select>
        </div>
        <div><label for="id_email">E-mail:</label></div>
        <div><input id="id_email" type="email" name="email" required /></div>
        <div><label for="id_telefono">Telefono:</label></div>
        <div><input id="id_telefono" type="text" name="telefono" /></div>
        <div><label for="id_pwd1">Password:</label></div>
        <div><input id="id_pwd1" type="password" name="pwd" required /></div>
        <div><label for="id_pwd2">Ripeti password:</label></div>
        <div><input id="id_pwd2" type="password" name="pwd2" required /></div>
        <div id="divterms">
          <input type="checkbox" id="id_terms" name="terms" />
          <label for="id_terms">Accetto i termini di licenza</label>
        </div>
        <footer>
          <button type="submit">Invia</button>
          <button type="reset">Annulla</button>
        </footer>
      </div>
    </form>
    <script src="script.js" type="text/javascript"></script>
  </body>
</html>
